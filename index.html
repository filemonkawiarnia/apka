<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

#root {
  --paper: #EDE6D6;
  --paper-light: #FAF7F0;
  --ink: #2E2A24;
  --cover: #3D5C4D;
  --cover-light: #4F7561;
  --stamp-red: #B5483D;
  --stamp-green: #6B8F71;

  --line: #D9CFBE;

  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
}

.fil-display { font-family: 'Fraunces', serif; }
.fil-mono { font-family: 'IBM Plex Mono', monospace; }
.muted { color: var(--ink); opacity: 0.55; }

.fil-header {
  background: var(--cover);
  color: var(--paper-light);

.fil-header p {

}

.fil-content {
  flex: 1;
  padding: 1.1rem 1.1rem 5.5rem;
}

.screen-title {
  font-size: 1.5rem;
  font-weight: 600;
  margin: 0 0 0.85rem;
}

.section-title {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;

.fil-nav {

<body>
<div id="root">
  <header class="fil-header">
    <button type="button" class="header-settings" data-nav="settings">Ustawienia</button>
    <h1></h1>
    <p>Książeczka zdrowia kotów</p>
  </header>
  <main id="app" class="fil-content"></main>
  <nav id="nav" class="fil-nav"></nav>
</div>

<script>
/* ============================================================
   KONFIGURACJA PRZYPOMNIEŃ
   ============================================================ */
const DEFAULT_REMINDER_SETTINGS = {
  dewormMode: 'simple',     // 'simple' = co X dni zawsze | 'course' = kurs N dawek co X dni, potem przerwa
  dewormInterval: 21,       // odrobaczenie — co ile dni (tryb simple)
  dewormCourseCount: 3,     // liczba dawek w kursie (tryb course)
  dewormCourseInterval: 14, // odstęp między dawkami w kursie w dniach (tryb course)
  dewormCourseBreak: 365,   // przerwa po zakończeniu kursu w dniach (tryb course)
  vaccMinGap: 28,           // szczepienie — odstęp do 2. dawki (dni)
  vaccBooster: 365,         // szczepienie — przypomnienie po dawce przypominającej (dni)
  checkupInterval: 180,     // wizyta kontrolna — co ile dni
  castrationAgeMonths: 6,   // wiek (miesiące), od którego przypominamy o kastracji/sterylizacji
  soonDays: 7,              // ile dni przed terminem oznaczać jako „wkrótce”
};

function loadReminderSettings() {
  try {
    const raw = localStorage.getItem('filemon-reminder-settings');
    return raw ? { ...DEFAULT_REMINDER_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_REMINDER_SETTINGS };
  } catch (err) {
    console.error(err);
    return { ...DEFAULT_REMINDER_SETTINGS };
  }
}

function saveReminderSettings(settings) {
  try {
    localStorage.setItem('filemon-reminder-settings', JSON.stringify(settings));
  } catch (err) {
    console.error(err);
  }
}

/* ============================================================
   IKONY (SVG, w stylu lucide)
   ============================================================ */
const PAW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><path d="M9 10a5 5 0 0 0-5 5 3.5 3.5 0 0 0 5.7 2.7l1.1-.9a3.5 3.5 0 0 1 4.4 0l1.1.9A3.5 3.5 0 0 0 22 15c0-3-3-6-6-6-2.5 0-4 1-7 1Z"/></svg>';
const ICON_HOME = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>';
const ICON_LIST = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h.01M3 6h.01M3 18h.01M8 12h13M8 6h13M8 18h13"/></svg>';
const ICON_PLUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>';
const ICON_HEART = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>';
const ICON_SEARCH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>';
const ICON_SLIDERS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>';

/* ============================================================
   POMOCNICZE FUNKCJE DATOWE
   ============================================================ */
function todayISO() { return new Date().toISOString().slice(0, 10); }

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function daysUntil(dateStr) {
  const target = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

function formatDatePL(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

function estimateBirthDate(years, months, fromDateStr) {
  const d = new Date(fromDateStr + 'T00:00:00');
  d.setFullYear(d.getFullYear() - Number(years || 0));
  d.setMonth(d.getMonth() - Number(months || 0));
  return d.toISOString().slice(0, 10);
}

function calcAge(birthDateStr) {
  if (!birthDateStr) return { years: 0, months: 0 };
  const birth = new Date(birthDateStr + 'T00:00:00');
  const now = new Date();
  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  if (now.getDate() < birth.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  if (years < 0) { years = 0; months = 0; }
  return { years, months };
}

function plYears(n) {
  if (n === 1) return 'rok';
  const lastTwo = n % 100, lastDigit = n % 10;
  if (lastTwo >= 12 && lastTwo <= 14) return 'lat';
  if (lastDigit >= 2 && lastDigit <= 4) return 'lata';
  return 'lat';
}
function plMonths(n) {
  if (n === 1) return 'miesiąc';
  const lastTwo = n % 100, lastDigit = n % 10;
  if (lastTwo >= 12 && lastTwo <= 14) return 'miesięcy';
  if (lastDigit >= 2 && lastDigit <= 4) return 'miesiące';
  return 'miesięcy';
}
function formatAge(birthDateStr) {
  const { years, months } = calcAge(birthDateStr);
  if (years === 0 && months === 0) return 'mniej niż miesiąc';
  const parts = [];
  if (years > 0) parts.push(`${years} ${plYears(years)}`);
  if (months > 0) parts.push(`${months} ${plMonths(months)}`);
  return parts.join(' i ');
}
function genderLabel(gender) { return gender === 'F' ? 'Kotka' : 'Kocur'; }

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function genId() {
  return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 6)}`;
}

/* ============================================================
   SILNIK PRZYPOMNIEŃ
   ============================================================ */
const REMINDER_LABELS = {
  deworming: () => 'Odrobaczenie',
  vaccination: () => 'Szczepienie',
  checkup: () => 'Wizyta kontrolna',
  castration: (cat) => (cat.gender === 'F' ? 'Sterylizacja' : 'Kastracja'),
  microchip: () => 'Czipowanie',
};

function statusFromDays(days, soonDays = 7) {
  if (days < 0) return 'overdue';
  if (days <= soonDays) return 'soon';
  return 'ok';
}

function getReminders(cat) {
  if (!cat || cat.status === 'adopted') return [];
  const settings = state.reminderSettings || DEFAULT_REMINDER_SETTINGS;
  const m = cat.medical || {};
  const results = [];
  const today = todayISO();

  const push = (type, dueDate) => {
    const days = daysUntil(dueDate);
    results.push({ key: type, type, label: REMINDER_LABELS[type](cat), dueDate, days, status: statusFromDays(days, settings.soonDays) });
  };

  const deworm = m.deworming || [];
  if (settings.dewormMode === 'course') {
    // Tryb kuracyjny: N dawek co X dni, potem przerwa Y dni
    const count = settings.dewormCourseCount || 3;
    const interval = settings.dewormCourseInterval || 14;
    const breakDays = settings.dewormCourseBreak || 365;
    if (deworm.length === 0) {
      push('deworming', cat.intakeDate);
    } else {
      // Znajdź początek aktualnego lub ostatniego kursu
      // Kurs zaczyna się od wpisu, po którym odstęp >= breakDays (lub od pierwszego wpisu)
      let courseStart = 0;
      for (let i = 1; i < deworm.length; i++) {
        const gap = daysUntil(deworm[i].date) - daysUntil(deworm[i - 1].date);
        const daysBetween = Math.round((new Date(deworm[i].date) - new Date(deworm[i - 1].date)) / 86400000);
        if (daysBetween >= breakDays * 0.7) courseStart = i; // nowy kurs
      }
      const dosesInCourse = deworm.length - courseStart;
      const lastDate = deworm[deworm.length - 1].date;
      if (dosesInCourse < count) {
        // Kurs w toku — kolejna dawka za interval dni
        push('deworming', addDays(lastDate, interval));
      } else {
        // Kurs zakończony — następny za breakDays od ostatniej dawki kursu
        push('deworming', addDays(lastDate, breakDays));
      }
    }
  } else {
    // Tryb prosty: co X dni zawsze
    if (deworm.length === 0) push('deworming', cat.intakeDate);
    else push('deworming', addDays(deworm[deworm.length - 1].date, settings.dewormInterval));
  }

  const vacc = m.vaccinations || [];
  if (vacc.length === 0) push('vaccination', cat.intakeDate);
  else if (vacc.length === 1) push('vaccination', addDays(vacc[0].date, settings.vaccMinGap));
  else push('vaccination', addDays(vacc[vacc.length - 1].date, settings.vaccBooster));

  const checkups = m.checkups || [];
  const lastCheckup = checkups.length ? checkups[checkups.length - 1].date : cat.intakeDate;
  push('checkup', addDays(lastCheckup, settings.checkupInterval));

  if (!m.castration?.done) {
    const age = calcAge(cat.birthDate);
    const ageMonths = age.years * 12 + age.months;
    if (ageMonths >= settings.castrationAgeMonths) push('castration', today);
  }

  if (!m.microchip?.done) push('microchip', cat.intakeDate);

  (m.medications || []).forEach((med, idx) => {
    if (med.nextDose) {
      const days = daysUntil(med.nextDose);
      results.push({ key: `medication-${idx}`, type: 'medication', label: `Lek: ${med.name}`, dueDate: med.nextDose, days, status: statusFromDays(days, settings.soonDays) });
    }
  });

  return results;
}

/* ============================================================
   STORAGE — localStorage (dane lokalne na tym urządzeniu)
   ============================================================ */
function loadCats() {
  try {
    const raw = localStorage.getItem('filemon-cats');
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveCats() {
  try {
    localStorage.setItem('filemon-cats', JSON.stringify(state.cats));
  } catch (err) {
    console.error(err);
    alert('Nie udało się zapisać danych — pamięć urządzenia może być pełna. Spróbuj wyeksportować dane i usunąć część zdjęć.');
  }
}

/* ============================================================
   KOMPRESJA ZDJĘCIA
   ============================================================ */
function compressImage(file, maxSize = 480, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) { if (width > maxSize) { height = Math.round(height * (maxSize / width)); width = maxSize; } }
        else { if (height > maxSize) { width = Math.round(width * (maxSize / height)); height = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function stampBadge(r) {
  const colors = { overdue: 'var(--stamp-red)', soon: 'var(--stamp-amber)', ok: 'var(--stamp-green)' };
  const cls = r.status === 'ok' ? 'done' : 'pending';
  return `<span class="fil-stamp ${cls}" style="color:${colors[r.status]}">${escapeHtml(r.label)}</span>`;
}

function reminderTag(reminder) {
  const colors = { overdue: 'var(--stamp-red)', soon: 'var(--stamp-amber)', ok: 'var(--stamp-green)' };
  const color = colors[reminder.status];
  let text;
  if (reminder.status === 'overdue') text = `Zaległe (${Math.abs(reminder.days)} dni)`;
  else if (reminder.days === 0) text = 'Termin: dziś';
  else text = `Termin za ${reminder.days} dni`;
  return `<span class="reminder-tag" style="color:${color};border-color:${color}">${text} · ${formatDatePL(reminder.dueDate)}</span>`;
}

function statusSummary(reminders) {
  const overdue = reminders.filter((r) => r.status === 'overdue').length;
  const soon = reminders.filter((r) => r.status === 'soon').length;
  if (overdue === 0 && soon === 0) return `<span class="reminder-tag" style="color:var(--stamp-green);border-color:var(--stamp-green)">Wszystko aktualne</span>`;
  let html = '';
  if (overdue > 0) html += `<span class="reminder-tag" style="color:var(--stamp-red);border-color:var(--stamp-red)">${overdue} zaległe</span> `;
  if (soon > 0) html += `<span class="reminder-tag" style="color:var(--stamp-amber);border-color:var(--stamp-amber)">${soon} wkrótce</span>`;
  return html;
}

function renderCatListScreen(mode) {
  const f = state.filters[mode];
  const byStatus = state.cats.filter((c) => (mode === 'list' ? c.status !== 'adopted' : c.status === 'adopted'));
  const filtered = byStatus.filter((cat) => {
    if (f.name.trim() && !cat.name.toLowerCase().includes(f.name.trim().toLowerCase())) return false;
    if (f.intakeFrom && cat.intakeDate < f.intakeFrom) return false;
    if (f.intakeTo && cat.intakeDate > f.intakeTo) return false;
    const ageYears = calcAge(cat.birthDate).years;
    if (f.ageMin !== '' && ageYears < Number(f.ageMin)) return false;
    if (f.ageMax !== '' && ageYears > Number(f.ageMax)) return false;
    return true;
  });
  const hasActive = f.name || f.intakeFrom || f.intakeTo || f.ageMin !== '' || f.ageMax !== '';
  const title = mode === 'list' ? 'Koty w stowarzyszeniu' : 'Adoptowane';
  const emptyText = byStatus.length === 0
    ? (mode === 'list' ? 'Brak kotów w stowarzyszeniu. Dodaj pierwszą kartę przez zakładkę „Nowy".' : 'Brak adoptowanych kotów.')
    : 'Żaden kot nie spełnia wybranych filtrów.';

  let html = `<h1 class="fil-display screen-title">${title}</h1>`;
  html += `<div class="search-bar">${ICON_SEARCH}
    <input type="text" id="filter-${mode}-name" placeholder="Szukaj po imieniu…" value="${escapeHtml(f.name)}" data-filter="${mode}:name">
    <button type="button" class="btn-link" data-action="toggle-filters" data-mode="${mode}">${ICON_SLIDERS}</button>
  </div>`;

  if (f.open) {
    html += `<div class="add-form" style="margin-top:.5rem;margin-bottom:.5rem">
      <div class="flex gap-2">
        <label class="field-label" style="flex:1">Data przyjęcia od<input type="date" id="filter-${mode}-intakeFrom" value="${f.intakeFrom}" data-filter="${mode}:intakeFrom"></label>
        <label class="field-label" style="flex:1">do<input type="date" id="filter-${mode}-intakeTo" value="${f.intakeTo}" data-filter="${mode}:intakeTo"></label>
      </div>
      <div class="flex gap-2">
        <label class="field-label" style="flex:1">Wiek od (lat)<input type="number" min="0" max="25" id="filter-${mode}-ageMin" value="${f.ageMin}" placeholder="0" data-filter="${mode}:ageMin"></label>
        <label class="field-label" style="flex:1">do (lat)<input type="number" min="0" max="25" id="filter-${mode}-ageMax" value="${f.ageMax}" placeholder="25" data-filter="${mode}:ageMax"></label>
      </div>
      ${hasActive ? `<button type="button" class="secondary" data-action="clear-filters" data-mode="${mode}">Wyczyść filtry</button>` : ''}
    </div>`;
  }

  html += `<p class="fil-mono muted" style="font-size:.7rem;margin:.3rem 0 .6rem">${filtered.length} ${filtered.length === 1 ? 'kot' : 'kotów'}${byStatus.length !== filtered.length ? ` z ${byStatus.length}` : ''}</p>`;

  if (filtered.length === 0) html += emptyState(emptyText);
  else html += `<div class="flex flex-col gap-2">` + filtered.map((cat) => catRow(cat, mode)).join('') + `</div>`;

  return html;
}

    <h2 class="section-title">Przypomnienia</h2>
    <p class="muted" style="font-size:.85rem;margin-bottom:.75rem">Ustaw, co ile dni mają wracać przypomnienia o zabiegach. Zmiany zapisują się automatycznie i dotyczą wszystkich kotów.</p>

    <fieldset style="border:1px solid var(--color-border,#e2e8f0);border-radius:.5rem;padding:.75rem;margin-bottom:.75rem">
      <legend style="font-size:.8rem;font-weight:600;padding:0 .25rem">Odrobaczenie</legend>
      <div style="margin-bottom:.6rem">
        <label style="font-size:.85rem;font-weight:500;display:block;margin-bottom:.3rem">Tryb przypomnień</label>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:.3rem;font-size:.85rem;cursor:pointer">
            <input type="radio" name="dewormMode" data-setting="dewormMode" value="simple" ${s.dewormMode !== 'course' ? 'checked' : ''}>
            Prosty (co X dni)
          </label>
          <label style="display:flex;align-items:center;gap:.3rem;font-size:.85rem;cursor:pointer">
            <input type="radio" name="dewormMode" data-setting="dewormMode" value="course" ${s.dewormMode === 'course' ? 'checked' : ''}>
            Kuracyjny (N dawek, potem przerwa)
          </label>
        </div>
      </div>
      <div id="deworm-simple-opts" style="${s.dewormMode === 'course' ? 'display:none' : ''}">
        <label class="field-label">Powtarzaj co (dni)<input type="number" inputmode="numeric" min="1" max="365" data-setting="dewormInterval" value="${s.dewormInterval}"></label>
      </div>
      <div id="deworm-course-opts" style="${s.dewormMode !== 'course' ? 'display:none' : ''}">
        <div class="flex gap-2">
          <label class="field-label" style="flex:1">Liczba dawek w kursie<input type="number" inputmode="numeric" min="1" max="30" data-setting="dewormCourseCount" value="${s.dewormCourseCount}"></label>
          <label class="field-label" style="flex:1">Odstęp między dawkami (dni)<input type="number" inputmode="numeric" min="1" max="90" data-setting="dewormCourseInterval" value="${s.dewormCourseInterval}"></label>
        </div>
        <label class="field-label">Przerwa po kursie (dni)<input type="number" inputmode="numeric" min="1" max="730" data-setting="dewormCourseBreak" value="${s.dewormCourseBreak}"></label>
        <p class="muted" style="font-size:.78rem;margin-top:.25rem">ℹ️ Np. 3 dawki co 14 dni, potem przerwa 365 dni — albo 3 dawki co 1 dzień (przez 3 dni), potem 365 dni przerwy.</p>
      </div>
    </fieldset>

    <div class="flex gap-2">
      <label class="field-label" style="flex:1">Szczepienie — odstęp do 2. dawki (dni)<input type="number" inputmode="numeric" min="1" max="365" data-setting="vaccMinGap" value="${s.vaccMinGap}"></label>
      <label class="field-label" style="flex:1">Szczepienie przypominające — co (dni)<input type="number" inputmode="numeric" min="1" max="1095" data-setting="vaccBooster" value="${s.vaccBooster}"></label>
    </div>

    <label class="field-label">Wizyta kontrolna — powtarzaj co (dni)<input type="number" inputmode="numeric" min="1" max="730" data-setting="checkupInterval" value="${s.checkupInterval}"></label>
    <label class="field-label">Kastracja/sterylizacja — przypominaj od wieku (miesiące)<input type="number" inputmode="numeric" min="0" max="36" data-setting="castrationAgeMonths" value="${s.castrationAgeMonths}"></label>
    <label class="field-label">Oznacz jako „wkrótce” — ile dni przed terminem<input type="number" inputmode="numeric" min="0" max="60" data-setting="soonDays" value="${s.soonDays}"></label>

    <button type="button" class="secondary" data-action="reset-reminder-settings" style="width:100%;margin-top:.4rem">Przywróć wartości domyślne</button>
  </section>`;
}

function renderSettings() {
  return `
  <div class="flex" style="margin-bottom:.75rem">
    <button type="button" class="btn-link" data-action="back-to-dashboard">← Wróć</button>
  </div>
  <h1 class="fil-display screen-title">Ustawienia</h1>
  ${renderReminderSettingsForm()}
  <section>
    <h2 class="section-title">Dane i kopia zapasowa</h2>
    <p class="muted" style="font-size:.85rem;margin-bottom:1rem">Dane są zapisane lokalnie, tylko w tej przeglądarce na tym urządzeniu. Aby przenieść je na inny telefon/komputer albo zrobić kopię zapasową, wyeksportuj plik i zaimportuj go na drugim urządzeniu.</p>
    <button type="button" class="primary" data-action="export-data" style="width:100%;margin-bottom:.6rem">Eksportuj dane (plik .json)</button>
    <button type="button" class="secondary" data-action="trigger-import" style="width:100%">Importuj dane z pliku</button>
    <input type="file" accept="application/json" class="visually-hidden" data-import-input>
    <p class="muted fil-mono" style="font-size:.7rem;margin-top:.6rem">Liczba kart kotów: ${state.cats.length}</p>
    <p class="muted" style="font-size:.75rem;margin-top:1.5rem">Uwaga: import zastąpi obecne dane w tej przeglądarce kopią z pliku.</p>
  </section>`;
}

/* ============================================================
   GŁÓWNE RENDEROWANIE
   ============================================================ */
function renderNav(active) {
  const tabs = [
    { key: 'dashboard', label: 'Pulpit', icon: ICON_HOME },
    { key: 'list', label: 'Koty', icon: ICON_LIST },
    { key: 'new', label: 'Nowy', icon: ICON_PLUS },
    { key: 'adopted', label: 'Adopcje', icon: ICON_HEART },
  ];
  return tabs.map((t) => `<button data-nav="${t.key}" class="${active === t.key ? 'active' : ''}">${t.icon}<span>${t.label}</span></button>`).join('');
}

function render() {
  const main = document.getElementById('app');
  let html;
  switch (state.screen.name) {
    case 'dashboard': html = renderDashboard(); break;
    case 'list': html = renderCatListScreen('list'); break;
    case 'adopted': html = renderCatListScreen('adopted'); break;
    case 'new': html = renderNewCatForm(); break;
    case 'settings': html = renderSettings(); break;
    case 'edit': {
      const cat = state.cats.find((c) => c.id === state.screen.id);
      html = cat ? renderEditCatForm(cat) : emptyState('Karta nie znaleziona.');
      break;
    }
    case 'detail': {
      const cat = state.cats.find((c) => c.id === state.screen.id);
      html = cat ? renderCatDetail(cat) : emptyState('Karta nie znaleziona.');
      break;
    }
    default: html = emptyState('Nieznany ekran.');
  }
  main.innerHTML = `<div class="screen">${html}</div>`;

  let activeTab = state.screen.name;
  if (activeTab === 'detail' || activeTab === 'edit') {
    const cat = state.cats.find((c) => c.id === state.screen.id);
    activeTab = cat?.status === 'adopted' ? 'adopted' : 'list';
  }
  document.getElementById('nav').innerHTML = renderNav(activeTab);
}

function rerenderPreserveFocus() {
  const active = document.activeElement;
  const id = active?.id;
  let selStart = null, selEnd = null;
  if (id) {
    try { selStart = active.selectionStart; selEnd = active.selectionEnd; } catch {}
  }
  render();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (selStart != null) { try { el.setSelectionRange(selStart, selEnd); } catch {} }
    }
  }
}

/* ============================================================
   AKCJE I OBSŁUGA ZDARZEŃ
   ============================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify({ cats: state.cats, reminderSettings: state.reminderSettings, exportedAt: todayISO() }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `filemon-koty-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const cats = Array.isArray(data) ? data : data.cats;
      if (!Array.isArray(cats)) throw new Error('nieprawidłowy format pliku');
      if (window.confirm(`Zaimportować ${cats.length} kart kotów? To zastąpi obecne dane w tej przeglądarce.`)) {
        state.cats = cats;
        saveCats();
        if (data.reminderSettings) {
          state.reminderSettings = { ...DEFAULT_REMINDER_SETTINGS, ...data.reminderSettings };
          saveReminderSettings(state.reminderSettings);
        }
        state.screen = { name: 'dashboard' };
        render();
      }
    } catch (err) {
      alert('Nie udało się wczytać pliku: ' + err.message);
    }
  };
  reader.readAsText(file);
}

const root = document.getElementById('root');

root.addEventListener('click', (e) => {
  const navBtn = e.target.closest('[data-nav]');
  if (navBtn) {
    const target = navBtn.dataset.nav;
    if (target === 'new') state.photoBuffer.new = null;
    state.screen = { name: target };
    render();
    return;
  }

  const openBtn = e.target.closest('[data-open]');
  if (openBtn) { state.screen = { name: 'detail', id: openBtn.dataset.open }; render(); return; }

  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;

  switch (action) {
    case 'back': {
      const cat = state.cats.find((c) => c.id === state.screen.id);
      state.screen = { name: cat?.status === 'adopted' ? 'adopted' : 'list' };
      render(); break;
    }
    case 'back-to-dashboard': state.screen = { name: 'dashboard' }; render(); break;
    case 'goto-edit': {
      const cat = state.cats.find((c) => c.id === actionEl.dataset.id);
      state.photoBuffer.edit = cat?.photo || null;
      state.screen = { name: 'edit', id: actionEl.dataset.id };
      render(); break;
    }
    case 'cancel-new': state.photoBuffer.new = null; state.screen = { name: 'dashboard' }; render(); break;
    case 'cancel-edit': state.photoBuffer.edit = null; state.screen = { name: 'detail', id: state.screen.id }; render(); break;
    case 'toggle-filters': {
      const mode = actionEl.dataset.mode;
      state.filters[mode].open = !state.filters[mode].open;
      render(); break;
    }
    case 'clear-filters': {
      const mode = actionEl.dataset.mode;
      Object.assign(state.filters[mode], { name: '', intakeFrom: '', intakeTo: '', ageMin: '', ageMax: '' });
      render(); break;
    }
    case 'toggle-section': {
      const key = actionEl.dataset.key;
      state.openSections[key] = !state.openSections[key];
      render(); break;
    }
    case 'toggle-adoption': {
      const cat = state.cats.find((c) => c.id === actionEl.dataset.id);
      if (cat.status === 'adopted') { cat.status = 'shelter'; cat.adoptionDate = null; }
      else { cat.status = 'adopted'; cat.adoptionDate = todayISO(); }
      saveCats(); render(); break;
    }
    case 'delete-cat': {
      const id = actionEl.dataset.id;
      const cat = state.cats.find((c) => c.id === id);
      if (window.confirm(`Usunąć kartę kota „${cat.name}"? Tej operacji nie można odwrócić.`)) {
        state.cats = state.cats.filter((c) => c.id !== id);
        saveCats();
        state.screen = { name: 'list' };
        render();
      }
      break;
    }
    case 'export-data': exportData(); break;
    case 'trigger-import': root.querySelector('[data-import-input]').click(); break;
    case 'reset-reminder-settings': {
      if (window.confirm('Przywrócić domyślne wartości przypomnień?')) {
        state.reminderSettings = { ...DEFAULT_REMINDER_SETTINGS };
        saveReminderSettings(state.reminderSettings);
        render();
      }
      break;
    }
  }
});

root.addEventListener('input', (e) => {
  const t = e.target;

  // podgląd daty urodzenia w formularzu "Nowy kot"
  if (t.closest('form[data-action="save-new-cat"]') && ['years', 'months', 'intakeDate'].includes(t.name)) {
    const form = t.closest('form');
    const fd = new FormData(form);
    const years = fd.get('years') || 0, months = fd.get('months') || 0, intake = fd.get('intakeDate') || todayISO();
    const preview = document.getElementById('new-birthdate-preview');
    if (preview) preview.textContent = `Szacowana data urodzenia: ${formatDatePL(estimateBirthDate(years, months, intake))}`;
    return;
  }

  // filtry list
  if (t.dataset.filter) {
    const [mode, field] = t.dataset.filter.split(':');
    state.filters[mode][field] = t.value;
    rerenderPreserveFocus();
    return;
  }

  // ustawienia przypomnień
  if (t.dataset.setting) {
    const key = t.dataset.setting;
    if (t.type === 'radio') {
      // Radio button (np. dewormMode)
      state.reminderSettings[key] = t.value;
      saveReminderSettings(state.reminderSettings);
      // Pokaż/ukryj odpowiednie opcje bez pełnego re-renderu
      const simpleOpts = document.getElementById('deworm-simple-opts');
      const courseOpts = document.getElementById('deworm-course-opts');
      if (simpleOpts && courseOpts) {
        simpleOpts.style.display = t.value === 'course' ? 'none' : '';
        courseOpts.style.display = t.value === 'course' ? '' : 'none';
      }
    } else {
      const min = t.min !== '' ? Number(t.min) : -Infinity;
      const max = t.max !== '' ? Number(t.max) : Infinity;
      let value = Math.round(Number(t.value));
      if (Number.isNaN(value)) return;
      value = Math.min(max, Math.max(min, value));
      state.reminderSettings[key] = value;
      saveReminderSettings(state.reminderSettings);
    }
  }
});

root.addEventListener('change', async (e) => {
  const photoInput = e.target.closest('[data-photo-input]');
  if (photoInput) {
    const file = photoInput.files?.[0];
    if (!file) return;
    const target = photoInput.dataset.photoInput.split('-')[0];
    try {
      const dataUrl = await compressImage(file);
      state.photoBuffer[target] = dataUrl;
      const frame = photoInput.parentElement.querySelector('.photo-frame');
      if (frame) frame.innerHTML = `<img src="${dataUrl}" alt="Zdjęcie kota">`;
    } catch (err) { console.error(err); }
    photoInput.value = '';
    return;
  }
  const importInput = e.target.closest('[data-import-input]');
  if (importInput) { handleImportFile(importInput.files?.[0]); importInput.value = ''; }
});

root.addEventListener('submit', (e) => {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const action = form.dataset.action;

  switch (action) {
    case 'save-new-cat': {
      const name = (fd.get('name') || '').trim();
      if (!name) return;
      const intakeDate = fd.get('intakeDate') || todayISO();
      const birthDate = estimateBirthDate(fd.get('years') || 0, fd.get('months') || 0, intakeDate);
      const newCat = {
        id: genId(),
        name,
        gender: fd.get('gender') || 'M',
        photo: state.photoBuffer.new || null,
        birthDate,
        intakeDate,
        status: 'shelter',
        adoptionDate: null,
        medical: { vaccinations: [], deworming: [], checkups: [], castration: { done: false, date: null }, microchip: { done: false, date: null, number: '' }, medications: [] },
        notes: [],
      };
      state.cats.push(newCat);
      saveCats();
      state.photoBuffer.new = null;
      state.screen = { name: 'detail', id: newCat.id };
      render();
      break;
    }
    case 'save-edit-cat': {
      const cat = state.cats.find((c) => c.id === form.dataset.catId);
      if (!cat) return;
      cat.name = (fd.get('name') || '').trim() || cat.name;
      cat.gender = fd.get('gender') || cat.gender;
      cat.birthDate = fd.get('birthDate') || cat.birthDate;
      cat.intakeDate = fd.get('intakeDate') || cat.intakeDate;
      if (state.photoBuffer.edit !== null && state.photoBuffer.edit !== undefined) cat.photo = state.photoBuffer.edit;
      saveCats();
      state.photoBuffer.edit = null;
      state.screen = { name: 'detail', id: cat.id };
      render();
      break;
    }
    case 'add-entry': {
      const cat = state.cats.find((c) => c.id === form.dataset.cat);
      const section = form.dataset.section;
      cat.medical[section] = cat.medical[section] || [];
      cat.medical[section].push({ date: fd.get('date'), note: (fd.get('note') || '').trim() });
      saveCats();
      state.openSections[`${cat.id}-${section}-open`] = false;
      render();
      break;
    }
    case 'set-onetime': {
      const cat = state.cats.find((c) => c.id === form.dataset.cat);
      const section = form.dataset.section;
      const payload = {};
      for (const [k, v] of fd.entries()) payload[k] = typeof v === 'string' ? v.trim() : v;
      payload.done = true;
      cat.medical[section] = payload;
      saveCats();
      state.openSections[`${cat.id}-${section}-open`] = false;
      render();
      break;
    }
    case 'add-medication': {
      const cat = state.cats.find((c) => c.id === form.dataset.cat);
      cat.medical.medications = cat.medical.medications || [];
      cat.medical.medications.push({ name: (fd.get('name') || '').trim(), date: fd.get('date'), nextDose: fd.get('nextDose') || null, note: (fd.get('note') || '').trim() });
      saveCats();
      state.openSections[`${cat.id}-medications-open`] = false;
      render();
      break;
    }
    case 'add-note': {
      const cat = state.cats.find((c) => c.id === form.dataset.cat);
      cat.notes = cat.notes || [];
      cat.notes.push({ date: todayISO(), text: (fd.get('text') || '').trim() });
      saveCats();
      state.openSections[`${cat.id}-notes-open`] = false;
      render();
      break;
    }
  }
});

/* ============================================================
   START
   ============================================================ */
document.querySelector('.fil-header h1').innerHTML = PAW_SVG + 'Filemon';
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
